<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>酒店预订 - 智游金旅</title>
    <script src="/js/userData.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: 
                radial-gradient(circle at 20% 80%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 119, 198, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(120, 219, 255, 0.2) 0%, transparent 50%),
                linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
        }
    </style>
</head>
<body>
<!-- 酒店预订页面 -->
<style>
    .top-buttons {
        position: fixed;
        top: 20px;
        right: 20px;
        display: flex;
        gap: 10px;
        z-index: 1000;
    }

    .back-button, .logout-button {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 50px;
        padding: 12px 20px;
        color: white;
        text-decoration: none;
        font-size: 14px;
        font-weight: 600;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .logout-button {
        color: #ff6b6b;
        border-color: rgba(255, 107, 107, 0.3);
    }

    .logout-button:hover {
        background: rgba(255, 107, 107, 0.2);
        color: #ff4757;
        transform: translateY(-2px);
    }

    .back-button:hover {
        background: rgba(255, 255, 255, 0.2);
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
    }

    /* 酒店旅游金融结合话术横幅 */
    .hotel-slogan-banner {
        background: linear-gradient(135deg, 
            rgba(255, 165, 0, 0.2) 0%, 
            rgba(255, 100, 200, 0.2) 50%, 
            rgba(0, 150, 255, 0.2) 100%);
        backdrop-filter: blur(15px);
        border-radius: 20px;
        padding: 25px 30px;
        margin: 20px 0 30px;
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.2);
        position: relative;
        overflow: hidden;
    }

    .hotel-slogan-banner::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, 
            transparent, 
            rgba(255, 255, 255, 0.1), 
            transparent);
        animation: sloganShine 3s ease-in-out infinite;
    }

    @keyframes sloganShine {
        0% { left: -100%; }
        50% { left: 100%; }
        100% { left: 100%; }
    }

    .hotel-slogan-title {
        font-size: 32px;
        font-weight: 800;
        background: linear-gradient(135deg, #ffa500, #ff6b6b, #4ecdc4, #f093fb);
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 15px;
        text-shadow: 0 0 30px rgba(255, 165, 0, 0.3);
        animation: titlePulse 2s ease-in-out infinite alternate;
    }

    .hotel-slogan-subtitle {
        font-size: 18px;
        color: rgba(255, 255, 255, 0.9);
        margin-bottom: 20px;
        font-weight: 500;
        line-height: 1.6;
    }

    .hotel-slogan-tags {
        display: flex;
        justify-content: center;
        gap: 20px;
        flex-wrap: wrap;
    }

    .hotel-tag {
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 25px;
        padding: 10px 20px;
        font-size: 14px;
        font-weight: 600;
        color: white;
        transition: all 0.3s ease;
        animation: tagFloat 3s ease-in-out infinite;
    }

    .hotel-tag:nth-child(1) { animation-delay: 0s; }
    .hotel-tag:nth-child(2) { animation-delay: 0.5s; }
    .hotel-tag:nth-child(3) { animation-delay: 1s; }
    .hotel-tag:nth-child(4) { animation-delay: 1.5s; }
    .hotel-tag:nth-child(5) { animation-delay: 2s; }

    .hotel-tag:hover {
        background: rgba(255, 255, 255, 0.25);
        transform: translateY(-3px) scale(1.05);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
    }

    @keyframes titlePulse {
        0% { transform: scale(1); }
        100% { transform: scale(1.02); }
    }

    @keyframes tagFloat {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-5px); }
    }

    /* 群体政策卡片样式 */
    .policy-cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 20px;
        margin: 30px 0;
    }

    .policy-card {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border-radius: 15px;
        padding: 20px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
    }

    .policy-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(90deg, #ff6b6b, #4ecdc4, #45b7d1);
    }

    .policy-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        background: rgba(255, 255, 255, 0.15);
    }

    .policy-card-header {
        display: flex;
        align-items: center;
        margin-bottom: 15px;
    }

    .policy-icon {
        font-size: 24px;
        margin-right: 10px;
    }

    .policy-title {
        font-size: 18px;
        font-weight: 700;
        color: white;
    }

    .policy-content {
        color: rgba(255, 255, 255, 0.9);
        line-height: 1.6;
        margin-bottom: 15px;
    }

    .policy-benefits {
        list-style: none;
        padding: 0;
    }

    .policy-benefits li {
        padding: 5px 0;
        color: rgba(255, 255, 255, 0.8);
        position: relative;
        padding-left: 20px;
    }

    .policy-benefits li::before {
        content: '✓';
        position: absolute;
        left: 0;
        color: #4ecdc4;
        font-weight: bold;
    }

    .bank-offer {
        background: linear-gradient(135deg, rgba(255, 107, 107, 0.2), rgba(255, 165, 0, 0.2));
        border: 1px solid rgba(255, 107, 107, 0.3);
        border-radius: 10px;
        padding: 15px;
        margin-top: 15px;
    }

    .bank-offer-title {
        font-weight: 700;
        color: #ff6b6b;
        margin-bottom: 10px;
    }

    .bank-offer-content {
        color: rgba(255, 255, 255, 0.9);
        font-size: 14px;
    }

    /* 优惠详情显示区域 */
    .benefits-display {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border-radius: 15px;
        padding: 20px;
        margin: 20px 0;
        border: 1px solid rgba(255, 255, 255, 0.2);
        display: none;
    }

    .benefits-display.show {
        display: block;
        animation: fadeIn 0.3s ease-in-out;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .benefits-title {
        font-size: 18px;
        font-weight: 700;
        color: #00d4ff;
        margin-bottom: 15px;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .benefits-list {
        list-style: none;
        padding: 0;
        margin-bottom: 15px;
    }

    .benefits-list li {
        padding: 8px 0;
        color: rgba(255, 255, 255, 0.9);
        position: relative;
        padding-left: 25px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .benefits-list li:last-child {
        border-bottom: none;
    }

    .benefits-list li::before {
        content: '✓';
        position: absolute;
        left: 0;
        color: #4ecdc4;
        font-weight: bold;
        font-size: 16px;
    }

    .bank-details {
        background: linear-gradient(135deg, rgba(255, 107, 107, 0.2), rgba(255, 165, 0, 0.2));
        border: 1px solid rgba(255, 107, 107, 0.3);
        border-radius: 10px;
        padding: 15px;
        margin-top: 15px;
    }

    .bank-details-title {
        font-weight: 700;
        color: #ff6b6b;
        margin-bottom: 10px;
        font-size: 16px;
    }

    .bank-details-content {
        color: rgba(255, 255, 255, 0.9);
        font-size: 14px;
        line-height: 1.5;
    }

    /* 酒店价格样式 */
    .hotel-price {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 10px 0;
        flex-wrap: wrap;
    }

    .original-price {
        text-decoration: line-through;
        color: rgba(255, 255, 255, 0.6);
        font-size: 14px;
    }

    .current-price {
        font-size: 24px;
        font-weight: 700;
        color: #00d4ff;
    }

    .price-unit {
        color: rgba(255, 255, 255, 0.8);
        font-size: 14px;
    }

    .discount-badge {
        background: linear-gradient(135deg, #ff6b6b, #ffa500);
        color: white;
        padding: 4px 8px;
        border-radius: 12px;
        font-size: 12px;
        font-weight: 600;
        animation: pulse 2s infinite;
    }

    @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
    }

    .rating-reviews {
        color: rgba(255, 255, 255, 0.7);
        font-size: 12px;
        margin-left: 5px;
    }

    /* 筛选选项样式 */
    .filters {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border-radius: 15px;
        padding: 20px;
        margin: 20px 0;
        border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .filters h4 {
        color: #00d4ff;
        margin-bottom: 15px;
        font-size: 18px;
        font-weight: 600;
    }

    .filter-options {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
    }

    .filter-option {
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 25px;
        padding: 8px 16px;
        color: white;
        cursor: pointer;
        transition: all 0.3s ease;
        font-size: 14px;
        font-weight: 500;
    }

    .filter-option:hover {
        background: rgba(255, 255, 255, 0.2);
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
    }

    .filter-option.active {
        background: linear-gradient(135deg, #00d4ff, #4ecdc4);
        border-color: #00d4ff;
        color: white;
        box-shadow: 0 5px 15px rgba(0, 212, 255, 0.3);
    }

    .filter-option.active:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(0, 212, 255, 0.4);
    }

    .back-button-icon {
        font-size: 16px;
    }

    /* 关怀模式按钮 */
    .care-mode-toggle {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 12px 16px;
        background: linear-gradient(135deg, #ff6b6b, #ffd700);
        border: none;
        border-radius: 25px;
        color: white;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
    }

    .care-mode-toggle:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(255, 107, 107, 0.4);
    }

    .care-mode-toggle .care-icon {
        font-size: 16px;
    }

    .care-mode-toggle .care-text {
        font-size: 13px;
    }

    /* 关怀模式面板样式 */
    .care-mode-panel {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 90%;
        max-width: 800px;
        max-height: 80vh;
        background: linear-gradient(135deg, 
            rgba(255, 255, 255, 0.95) 0%, 
            rgba(255, 255, 255, 0.9) 100%);
        backdrop-filter: blur(20px);
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        z-index: 10000;
        overflow-y: auto;
        border: 2px solid rgba(255, 107, 107, 0.3);
    }

    .care-panel-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 30px;
        border-bottom: 2px solid rgba(255, 107, 107, 0.2);
        background: linear-gradient(135deg, #ff6b6b, #ffd700);
        color: white;
        border-radius: 18px 18px 0 0;
    }

    .care-panel-header h3 {
        margin: 0;
        font-size: 24px;
        font-weight: 700;
    }

    .care-close-btn {
        background: rgba(255, 255, 255, 0.2);
        border: none;
        color: white;
        font-size: 24px;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .care-close-btn:hover {
        background: rgba(255, 255, 255, 0.3);
        transform: scale(1.1);
    }

    .care-panel-content {
        padding: 30px;
    }

    .care-section {
        margin-bottom: 30px;
    }

    .care-section h4 {
        color: #333;
        font-size: 18px;
        font-weight: 600;
        margin-bottom: 15px;
        padding-bottom: 8px;
        border-bottom: 2px solid #ff6b6b;
    }

    .care-options {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
    }

    .care-btn {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 15px 20px;
        background: linear-gradient(135deg, 
            rgba(255, 107, 107, 0.1) 0%, 
            rgba(255, 215, 0, 0.1) 100%);
        border: 2px solid rgba(255, 107, 107, 0.3);
        border-radius: 12px;
        color: #333;
        font-size: 16px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.3s ease;
        text-align: left;
    }

    .care-btn:hover {
        background: linear-gradient(135deg, 
            rgba(255, 107, 107, 0.2) 0%, 
            rgba(255, 215, 0, 0.2) 100%);
        border-color: #ff6b6b;
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(255, 107, 107, 0.2);
    }

    .care-btn.active {
        background: linear-gradient(135deg, #ff6b6b, #ffd700);
        color: white;
        border-color: transparent;
    }

    .care-icon {
        font-size: 20px;
        width: 24px;
        text-align: center;
    }

    /* 放大镜样式 */
    .magnifier {
        position: fixed;
        width: 200px;
        height: 200px;
        border: 3px solid #ff6b6b;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(5px);
        z-index: 9999;
        pointer-events: none;
        box-shadow: 0 0 20px rgba(255, 107, 107, 0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }

    .magnifier-content {
        text-align: center;
        color: #333;
    }

    .magnifier-tag {
        font-size: 12px;
        color: #666;
        margin-bottom: 8px;
        font-weight: 500;
    }

    .magnifier-text {
        font-size: 16px;
        font-weight: 600;
        line-height: 1.4;
        word-break: break-word;
    }

    /* 语音扫描按钮样式 */
    .voice-scan-button {
        position: fixed;
        width: 50px;
        height: 50px;
        background: linear-gradient(135deg, #ff6b6b, #ffd700);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        cursor: pointer;
        z-index: 9999;
        box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
        animation: voiceScanPulse 2s infinite;
        pointer-events: none;
    }

    @keyframes voiceScanPulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.1); }
        100% { transform: scale(1); }
    }

    /* 语音朗读提示样式 */
    .voice-reading-tip {
        position: fixed;
        top: 20px;
        right: 20px;
        background: linear-gradient(135deg, #ff6b6b, #ffd700);
        color: white;
        padding: 15px 20px;
        border-radius: 10px;
        box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
        z-index: 10001;
        animation: slideInRight 0.3s ease;
    }

    .voice-reading-tip .tip-content {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .voice-reading-tip .tip-icon {
        font-size: 18px;
    }

    .voice-reading-tip .tip-text {
        font-size: 14px;
        font-weight: 500;
    }

    @keyframes slideInRight {
        from {
            transform: translateX(100%);
            opacity: 0;
        }
        to {
            transform: translateX(0);
            opacity: 1;
        }
    }

    /* 高对比度模式 */
    .high-contrast {
        filter: contrast(1.5) brightness(1.2);
    }

    .high-contrast * {
        color: #000 !important;
        background-color: #fff !important;
    }

    .high-contrast .sidebar,
    .high-contrast .hero-banner {
        background: #000 !important;
        color: #fff !important;
    }

    /* 大字体模式 */
    .large-text {
        font-size: 1.2em;
    }

    .large-text h1 { font-size: 2.5em; }
    .large-text h2 { font-size: 2em; }
    .large-text h3 { font-size: 1.8em; }
    .large-text p { font-size: 1.3em; }
    .large-text .menu-link { font-size: 1.2em; }

    /* 色彩辅助模式 */
    .color-assist {
        filter: grayscale(0.3) saturate(1.5);
    }

    /* 大按钮模式 */
    .large-buttons button,
    .large-buttons .menu-link,
    .large-buttons .care-btn {
        padding: 20px 30px !important;
        font-size: 18px !important;
        min-height: 60px !important;
    }

    /* 键盘导航模式 */
    .keyboard-nav *:focus {
        outline: 3px solid #ff6b6b !important;
        outline-offset: 2px !important;
    }

    /* 焦点高亮模式 */
    .focus-highlight *:focus {
        background: rgba(255, 107, 107, 0.2) !important;
        box-shadow: 0 0 10px rgba(255, 107, 107, 0.5) !important;
    }

    /* 简化界面模式 */
    .simplified-ui .hero-banner {
        padding: 20px !important;
    }

    .simplified-ui .feature-cards {
        display: none;
    }

    .simplified-ui .ai-chat-window {
        display: none;
    }

    /* 响应式设计 */
    @media (max-width: 768px) {
        .care-mode-panel {
            width: 95%;
            max-height: 90vh;
        }
        
        .care-options {
            grid-template-columns: 1fr;
        }
        
        .care-btn {
            padding: 12px 16px;
            font-size: 14px;
        }
    }
</style>

<!-- 关怀模式、返回按钮和注销按钮 -->
<div class="top-buttons">
    <button class="care-mode-toggle" onclick="toggleCareMode()" title="关怀模式">
        <span class="care-icon">❤️</span>
        <span class="care-text">关怀模式</span>
    </button>
<a href="/main" class="back-button">
    <span class="back-button-icon">←</span>
    <span>返回主页</span>
</a>
    <a href="#" class="logout-button" onclick="handleLogout()">
        <span class="logout-icon">🚪</span>
        <span>注销登录</span>
    </a>
</div>

<style>
    .booking-header {
        text-align: center;
        margin-bottom: 30px;
    }

    .booking-header h2 {
        color: white;
        margin-bottom: 30px;
        font-size: 28px;
    }

    .search-form {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 15px;
        padding: 25px;
        margin-bottom: 30px;
        backdrop-filter: blur(10px);
    }

    .search-form h3 {
        color: #00d4ff;
        margin-bottom: 20px;
        font-size: 20px;
    }

    .form-row {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-bottom: 20px;
    }

    .form-group {
        display: flex;
        flex-direction: column;
    }

    .form-group label {
        color: white;
        margin-bottom: 8px;
        font-size: 14px;
        font-weight: 600;
    }

    .form-group input,
    .form-group select {
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 8px;
        padding: 12px;
        color: white;
        font-size: 14px;
        outline: none;
    }

    .form-group input::placeholder {
        color: rgba(255, 255, 255, 0.6);
    }

    .form-group select option {
        background: #333;
        color: white;
    }

    .search-button {
        background: linear-gradient(135deg, #00d4ff, #ff6b6b);
        border: none;
        color: white;
        padding: 15px 30px;
        border-radius: 10px;
        cursor: pointer;
        font-size: 16px;
        font-weight: 600;
        transition: all 0.3s ease;
        width: 100%;
    }

    .search-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 212, 255, 0.3);
    }

// 酒店预订页面特定的JavaScript功能
document.addEventListener('DOMContentLoaded', function() {
    // 检查登录状态
    if (!checkLoginStatus()) return;
    
    // 设置默认日期
    setDefaultDates();
    // 加载酒店数据
    loadHotels();
    
    // 初始化酒店预订页面互动功能
    initBookingInteractiveFeatures();
});

// 设置默认日期
function setDefaultDates() {
    const today = new Date();
    const tomorrow = new Date(today);
    tomorrow.setDate(tomorrow.getDate() + 1);
    const dayAfter = new Date(today);
    dayAfter.setDate(dayAfter.getDate() + 2);
    
    document.getElementById('checkinDate').value = tomorrow.toISOString().split('T')[0];
    document.getElementById('checkoutDate').value = dayAfter.toISOString().split('T')[0];
}

// 加载酒店数据
async function loadHotels(destination = '北京', priceRange = '1000-1500', starRating = 'all', userGroup = 'general', bankOffer = 'none') {
    try {
        // 模拟酒店数据
        const mockHotels = generateMockHotels(destination, priceRange, starRating, userGroup, bankOffer);
        displayHotels(mockHotels);
    } catch (error) {
        console.error('加载酒店数据时出错:', error);
        const hotelsGrid = document.getElementById('hotelsGrid');
        hotelsGrid.innerHTML = '<div style="text-align: center; color: rgba(255,255,255,0.6); grid-column: 1 / -1;">酒店数据暂时不可用</div>';
    }
}

// 生成美观的酒店 SVG 占位图片
function generateHotelPlaceholder(hotelName, stars) {
    const starColors = {
        5: ['#ffd700', '#ffed4e'],
        4: ['#ff6b6b', '#ee5a6f'],
        3: ['#4ecdc4', '#44a08d'],
        2: ['#95a5a6', '#7f8c8d']
    };
    const gradient = starColors[stars] || starColors[3];
    const cleanName = hotelName.replace(/北京|酒店/g, '').trim();
    
    return `data:image/svg+xml,${encodeURIComponent(`
        <svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="hotelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:${gradient[0]};stop-opacity:1" />
                    <stop offset="100%" style="stop-color:${gradient[1]};stop-opacity:1" />
                </linearGradient>
            </defs>
            <rect width="100%" height="100%" fill="url(#hotelGrad)"/>
            <text x="50%" y="45%" font-family="Arial, sans-serif" font-size="20" font-weight="bold" 
                  fill="white" text-anchor="middle">${cleanName}</text>
            <text x="50%" y="60%" font-family="Arial, sans-serif" font-size="16" 
                  fill="rgba(255,255,255,0.9)" text-anchor="middle">${'★'.repeat(stars)}</text>
        </svg>
    `)}`;
}

// 获取用户群体和银行优惠的折扣
function getDiscountForGroup(userGroup, bankOffer) {
    const groupDiscounts = {
        general: 1.0,
        business: 0.9,
        family: 0.95,
        senior: 0.85,
        student: 0.8,
        vip: 0.7,
        international: 0.9
    };

    const bankDiscounts = {
        none: 1.0,
        'icbc-business': 0.85,
        'icbc-family': 0.9,
        'icbc-senior': 0.8,
        'icbc-student': 0.75,
        'icbc-diamond': 0.7,
        'icbc-international': 0.8
    };

    return Math.min(groupDiscounts[userGroup] || 1.0, bankDiscounts[bankOffer] || 1.0);
}

// 带筛选条件的酒店加载
function loadHotelsWithFilter(destination, priceRange, starRating, userGroup, bankOffer, amenityFilter) {
    try {
        const mockHotels = generateMockHotels(destination, priceRange, starRating, userGroup, bankOffer);
        
        // 根据设施筛选
        let filteredHotels = mockHotels;
        if (amenityFilter !== 'all') {
            filteredHotels = mockHotels.filter(hotel => {
                return hotel.amenities.some(amenity => {
                    const amenityMap = {
                        'wifi': '免费WiFi',
                        'gym': '健身房',
                        'pool': '游泳池',
                        'spa': 'SPA',
                        'parking': '停车场',
                        'restaurant': '餐厅',
                        'business': '商务中心',
                        'concierge': '礼宾服务',
                        'breakfast': '早餐'
                    };
                    return amenity.includes(amenityMap[amenityFilter] || amenityFilter);
                });
            });
        }
        
        displayHotels(filteredHotels);
    } catch (error) {
        console.error('筛选酒店时出错:', error);
        const hotelsGrid = document.getElementById('hotelsGrid');
        hotelsGrid.innerHTML = '<div style="text-align: center; color: rgba(255,255,255,0.6); grid-column: 1 / -1;">筛选失败，请重试</div>';
    }
}

// 搜索表单互动
function addSearchFormInteractions() {
    const searchForm = document.querySelector('.search-form');
    const searchInputs = document.querySelectorAll('.search-form input, .search-form select');
    
    searchInputs.forEach(input => {
        // 输入框焦点效果
        input.addEventListener('focus', function() {
            this.style.borderColor = '#00d4ff';
            this.style.boxShadow = '0 0 10px rgba(0, 212, 255, 0.3)';
        });
        
        input.addEventListener('blur', function() {
            this.style.borderColor = '';
            this.style.boxShadow = '';
        });
        
        // 输入时实时搜索
        input.addEventListener('input', function() {
            if (this.type === 'text' || this.type === 'date') {
                debounceSearch();
            }
        });
        
        input.addEventListener('change', function() {
            if (this.type === 'select-one') {
                debounceSearch();
            }
        });
    });
    
    // 搜索按钮点击效果
    const searchButton = document.querySelector('.search-button');
    if (searchButton) {
        searchButton.addEventListener('click', function() {
            this.style.transform = 'scale(0.95)';
            setTimeout(() => {
                this.style.transform = 'scale(1)';
            }, 150);
        });
    }
}

// 防抖搜索
let searchTimeout;
function debounceSearch() {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
        loadHotels();
    }, 500);
}

// 酒店卡片互动
function addHotelCardInteractions() {
    const hotelCards = document.querySelectorAll('.hotel-card');
    hotelCards.forEach(card => {
        // 悬停效果
        card.addEventListener('mouseenter', function() {
            this.style.transform = 'translateY(-8px)';
            this.style.boxShadow = '0 15px 40px rgba(0, 212, 255, 0.3)';
        });
        
        card.addEventListener('mouseleave', function() {
            this.style.transform = 'translateY(0)';
            this.style.boxShadow = '0 5px 15px rgba(0, 0, 0, 0.1)';
        });
        
        // 点击效果
        card.addEventListener('click', function() {
            this.style.transform = 'scale(0.98)';
            setTimeout(() => {
                this.style.transform = 'scale(1)';
            }, 150);
            
            // 显示酒店详情
            showHotelDetails(this);
        });
    });
}

// 开始预订流程
function startBookingProcess(button) {
    const hotelCard = button.closest('.hotel-card');
    const hotelName = hotelCard.querySelector('.hotel-name')?.textContent || '酒店';
    
    // 显示预订步骤
    const bookingSteps = [
        '选择房型',
        '填写入住信息',
        '选择支付方式',
        '确认预订'
    ];
    
    let currentStep = 0;
    
    const showBookingStep = () => {
        if (currentStep < bookingSteps.length) {
            const stepDiv = document.createElement('div');
            stepDiv.className = 'booking-step-modal';
            stepDiv.innerHTML = `
                <div class="step-content">
                    <div class="step-header">
                        <h3>预订 ${hotelName}</h3>
                        <button class="step-close" onclick="this.parentElement.parentElement.remove()">×</button>
                    </div>
                    <div class="step-body">
                        <div class="step-progress">
                            <div class="progress-bar" style="width: ${(currentStep + 1) / bookingSteps.length * 100}%"></div>
                        </div>
                        <div class="step-title">步骤 ${currentStep + 1}: ${bookingSteps[currentStep]}</div>
                        <div class="step-content-area">
                            ${getStepContent(currentStep)}
                        </div>
                        <div class="step-actions">
                            ${currentStep > 0 ? '<button class="step-btn secondary" onclick="previousStep()">上一步</button>' : ''}
                            <button class="step-btn primary" onclick="nextStep()">${currentStep === bookingSteps.length - 1 ? '完成预订' : '下一步'}</button>
                        </div>
                    </div>
                </div>
            `;
            
            document.body.appendChild(stepDiv);
        }
    };
    
    const getStepContent = (step) => {
        switch(step) {
            case 0: return '<div class="room-options">选择房型内容...</div>';
            case 1: return '<div class="guest-info">填写入住信息内容...</div>';
            case 2: return '<div class="payment-options">选择支付方式内容...</div>';
            case 3: return '<div class="booking-confirmation">确认预订内容...</div>';
            default: return '';
        }
    };
    
    const nextStep = () => {
        currentStep++;
        showBookingStep();
    };
    
    const previousStep = () => {
        currentStep--;
        showBookingStep();
    };
    
    // 全局函数
    window.nextStep = nextStep;
    window.previousStep = previousStep;
    
    showBookingStep();
}

// 更新酒店价格
function updateHotelPrices() {
    const priceElements = document.querySelectorAll('.hotel-price');
    priceElements.forEach(element => {
        // 模拟价格变化
        const currentPrice = parseFloat(element.textContent.replace(/[^\d.]/g, ''));
        const change = (Math.random() - 0.5) * 0.05; // ±2.5%变化
        const newPrice = currentPrice * (1 + change);
        
        element.textContent = `¥${newPrice.toFixed(0)}`;
        
        // 添加变化指示
        if (change > 0) {
            element.style.color = '#ff6b6b';
            element.style.transform = 'scale(1.1)';
        } else {
            element.style.color = '#00ff88';
            element.style.transform = 'scale(1.1)';
        }
        
        setTimeout(() => {
            element.style.color = '';
            element.style.transform = 'scale(1)';
        }, 1000);
    });
}

// 放大镜功能
function toggleMagnifier() {
    magnifierEnabled = !magnifierEnabled;
    
    if (magnifierEnabled) {
        enableMagnifier();
        updateButtonState('magnifier', true);
    } else {
        disableMagnifier();
        updateButtonState('magnifier', false);
    }
}

function enableMagnifier() {
    const magnifier = document.createElement('div');
    magnifier.id = 'magnifier';
    magnifier.className = 'magnifier';
    document.body.appendChild(magnifier);
    
    // 让关怀模式面板透明
    const carePanel = document.getElementById('careModePanel');
    if (carePanel) {
        carePanel.style.opacity = '0.3';
    }
    
    document.addEventListener('mousemove', handleMagnifierMove);
}

function disableMagnifier() {
    const magnifier = document.getElementById('magnifier');
    if (magnifier) {
        magnifier.remove();
    }
    
    // 恢复关怀模式面板透明度
    const carePanel = document.getElementById('careModePanel');
    if (carePanel) {
        carePanel.style.opacity = '1';
    }
    
    document.removeEventListener('mousemove', handleMagnifierMove);
}

function handleMagnifierMove(e) {
    const magnifier = document.getElementById('magnifier');
    if (magnifier) {
        const rect = magnifier.getBoundingClientRect();
        const centerX = rect.width / 2;
        const centerY = rect.height / 2;
        
        magnifier.style.left = (e.clientX - centerX) + 'px';
        magnifier.style.top = (e.clientY - centerY) + 'px';
        
        // 获取鼠标位置下的元素
        const elementBelow = document.elementFromPoint(e.clientX, e.clientY);
        if (elementBelow) {
            // 放大显示元素内容
            const elementText = elementBelow.textContent || elementBelow.innerText || '';
            const elementTag = elementBelow.tagName.toLowerCase();
            
            magnifier.innerHTML = `
                <div class="magnifier-content">
                    <div class="magnifier-tag">${elementTag}</div>
                    <div class="magnifier-text">${elementText.substring(0, 100)}</div>
                </div>
            `;
        }
    }
}

function startVoiceRecognition() {
    // 创建扫描按钮
    const scanButton = document.createElement('div');
    scanButton.id = 'voiceScanButton';
    scanButton.className = 'voice-scan-button';
    scanButton.innerHTML = '📖';
    document.body.appendChild(scanButton);
    
    // 让关怀模式面板透明
    const carePanel = document.getElementById('careModePanel');
    if (carePanel) {
        carePanel.style.opacity = '0.3';
    }
    
    // 添加鼠标移动事件监听
    document.addEventListener('mousemove', handleVoiceScan);
    document.addEventListener('click', handleVoiceScanClick);
}

function stopVoiceRecognition() {
    const scanButton = document.getElementById('voiceScanButton');
    if (scanButton) {
        scanButton.remove();
    }
    
    // 恢复关怀模式面板透明度
    const carePanel = document.getElementById('careModePanel');
    if (carePanel) {
        carePanel.style.opacity = '1';
    }
    
    document.removeEventListener('mousemove', handleVoiceScan);
    document.removeEventListener('click', handleVoiceScanClick);
}

function handleVoiceScan(e) {
    const scanButton = document.getElementById('voiceScanButton');
    if (scanButton) {
        scanButton.style.left = (e.clientX - 25) + 'px';
        scanButton.style.top = (e.clientY - 25) + 'px';
    }
}

function handleVoiceScanClick(e) {
    e.preventDefault();
    const elementBelow = document.elementFromPoint(e.clientX, e.clientY);
    if (elementBelow) {
        const text = elementBelow.textContent || elementBelow.innerText || '';
        if (text.trim()) {
            // 使用语音合成朗读文字
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-CN';
                utterance.rate = 0.8;
                utterance.pitch = 1;
                speechSynthesis.speak(utterance);
                
                // 显示朗读提示
                showVoiceReadingTip(text);
            }
        }
    }
}

function showVoiceReadingTip(text) {
    const tip = document.createElement('div');
    tip.className = 'voice-reading-tip';
    tip.innerHTML = `
        <div class="tip-content">
            <span class="tip-icon">🔊</span>
            <span class="tip-text">正在朗读：${text.substring(0, 20)}...</span>
        </div>
    `;
    document.body.appendChild(tip);
    
    setTimeout(() => {
        if (tip.parentElement) {
            tip.remove();
        }
    }, 3000);
}

// 更新按钮状态
function updateButtonState(buttonType, isActive) {
    const buttons = document.querySelectorAll('.care-btn');
    buttons.forEach(button => {
        const icon = button.querySelector('.care-icon');
        if (icon) {
            if (buttonType === 'magnifier' && icon.textContent === '🔍') {
                button.classList.toggle('active', isActive);
            } else if (buttonType === 'voice' && icon.textContent === '🎤') {
                button.classList.toggle('active', isActive);
            }
        }
    });
}

// 禁用所有关怀功能
function disableAllCareFeatures() {
    magnifierEnabled = false;
    voiceEnabled = false;
    highContrastEnabled = false;
    largeTextEnabled = false;
    
    document.body.classList.remove('high-contrast', 'large-text', 'color-assist', 'large-buttons', 'keyboard-nav', 'focus-highlight', 'simplified-ui');
    disableMagnifier();
    stopVoiceRecognition();
}
