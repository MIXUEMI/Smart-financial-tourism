<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>市场分析 - 智游金旅</title>
    <script src="/js/userData.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: 
                radial-gradient(circle at 20% 80%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 119, 198, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(120, 219, 255, 0.2) 0%, transparent 50%),
                linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
        }
    </style>
</head>
<body>
<!-- 市场分析页面 -->
<style>
    .top-buttons {
        position: fixed;
        top: 20px;
        right: 20px;
        display: flex;
        gap: 10px;
        z-index: 1000;
    }

    .back-button, .logout-button {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 50px;
        padding: 12px 20px;
        color: white;
        text-decoration: none;
        font-size: 14px;
        font-weight: 600;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .logout-button {
        color: #ff6b6b;
        border-color: rgba(255, 107, 107, 0.3);
    }

    .logout-button:hover {
        background: rgba(255, 107, 107, 0.2);
        color: #ff4757;
        transform: translateY(-2px);
    }

    .back-button:hover {
        background: rgba(255, 255, 255, 0.2);
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
    }

    /* 市场分析金融旅游结合话术横幅 */
    .market-slogan-banner {
        background: linear-gradient(135deg, 
            rgba(0, 100, 200, 0.2) 0%, 
            rgba(100, 200, 255, 0.2) 50%, 
            rgba(200, 100, 255, 0.2) 100%);
        backdrop-filter: blur(15px);
        border-radius: 20px;
        padding: 25px 30px;
        margin: 20px 0 30px;
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.2);
        position: relative;
        overflow: hidden;
    }

    .market-slogan-banner::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, 
            transparent, 
            rgba(255, 255, 255, 0.1), 
            transparent);
        animation: sloganShine 3s ease-in-out infinite;
    }

    @keyframes sloganShine {
        0% { left: -100%; }
        50% { left: 100%; }
        100% { left: 100%; }
    }

    .market-slogan-title {
        font-size: 32px;
        font-weight: 800;
        background: linear-gradient(135deg, #4ecdc4, #44a08d, #093637, #0f4c75);
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 15px;
        text-shadow: 0 0 30px rgba(78, 205, 196, 0.3);
        animation: titlePulse 2s ease-in-out infinite alternate;
    }

    .market-slogan-subtitle {
        font-size: 18px;
        color: rgba(255, 255, 255, 0.9);
        margin-bottom: 20px;
        font-weight: 500;
        line-height: 1.6;
    }

    .market-slogan-tags {
        display: flex;
        justify-content: center;
        gap: 20px;
        flex-wrap: wrap;
    }

    .market-tag {
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 25px;
        padding: 10px 20px;
        font-size: 14px;
        font-weight: 600;
        color: white;
        transition: all 0.3s ease;
        animation: tagFloat 3s ease-in-out infinite;
    }

    .market-tag:nth-child(1) { animation-delay: 0s; }
    .market-tag:nth-child(2) { animation-delay: 0.5s; }
    .market-tag:nth-child(3) { animation-delay: 1s; }
    .market-tag:nth-child(4) { animation-delay: 1.5s; }
    .market-tag:nth-child(5) { animation-delay: 2s; }

    .market-tag:hover {
        background: rgba(255, 255, 255, 0.25);
        transform: translateY(-3px) scale(1.05);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
    }

    @keyframes titlePulse {
        0% { transform: scale(1); }
        100% { transform: scale(1.02); }
    }

    @keyframes tagFloat {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-5px); }
    }

    /* 响应式设计 */
    @media (max-width: 768px) {
        .market-slogan-banner {
            padding: 20px 15px;
            margin: 15px 0 20px;
        }

        .market-slogan-title {
            font-size: 24px;
        }

        .market-slogan-subtitle {
            font-size: 16px;
        }

        .market-slogan-tags {
            gap: 10px;
        }

        .market-tag {
            padding: 8px 15px;
            font-size: 12px;
        }

        .top-buttons {
            top: 15px;
            right: 15px;
            flex-direction: column;
            gap: 8px;
        }

        .back-button, .logout-button {
            padding: 10px 15px;
            font-size: 12px;
        }
    }

    @media (max-width: 480px) {
        .market-slogan-title {
            font-size: 20px;
        }

        .market-slogan-subtitle {
            font-size: 14px;
        }

        .market-tag {
            padding: 6px 12px;
            font-size: 11px;
        }
    }

    .back-button-icon {
        font-size: 16px;
    }

    /* 关怀模式按钮 */
    .care-mode-toggle {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 12px 16px;
        background: linear-gradient(135deg, #ff6b6b, #ffd700);
        border: none;
        border-radius: 25px;
        color: white;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
    }

    .care-mode-toggle:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(255, 107, 107, 0.4);
    }

    .care-mode-toggle .care-icon {
        font-size: 16px;
    }

    .care-mode-toggle .care-text {
        font-size: 13px;
    }

    /* 关怀模式面板样式 */
    .care-mode-panel {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 90%;
        max-width: 800px;
        max-height: 80vh;
        background: linear-gradient(135deg, 
            rgba(255, 255, 255, 0.95) 0%, 
            rgba(255, 255, 255, 0.9) 100%);
        backdrop-filter: blur(20px);
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        z-index: 10000;
        overflow-y: auto;
        border: 2px solid rgba(255, 107, 107, 0.3);
    }

    .care-panel-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 30px;
        border-bottom: 2px solid rgba(255, 107, 107, 0.2);
        background: linear-gradient(135deg, #ff6b6b, #ffd700);
        color: white;
        border-radius: 18px 18px 0 0;
    }

    .care-panel-header h3 {
        margin: 0;
        font-size: 24px;
        font-weight: 700;
    }

    .care-close-btn {
        background: rgba(255, 255, 255, 0.2);
        border: none;
        color: white;
        font-size: 24px;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .care-close-btn:hover {
        background: rgba(255, 255, 255, 0.3);
        transform: scale(1.1);
    }

    .care-panel-content {
        padding: 30px;
    }

    .care-section {
        margin-bottom: 30px;
    }

    .care-section h4 {
        color: #333;
        font-size: 18px;
        font-weight: 600;
        margin-bottom: 15px;
        padding-bottom: 8px;
        border-bottom: 2px solid #ff6b6b;
    }

    .care-options {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
    }

    .care-btn {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 15px 20px;
        background: linear-gradient(135deg, 
            rgba(255, 107, 107, 0.1) 0%, 
            rgba(255, 215, 0, 0.1) 100%);
        border: 2px solid rgba(255, 107, 107, 0.3);
        border-radius: 12px;
        color: #333;
        font-size: 16px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.3s ease;
        text-align: left;
    }

    .care-btn:hover {
        background: linear-gradient(135deg, 
            rgba(255, 107, 107, 0.2) 0%, 
            rgba(255, 215, 0, 0.2) 100%);
        border-color: #ff6b6b;
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(255, 107, 107, 0.2);
    }

    .care-btn.active {
        background: linear-gradient(135deg, #ff6b6b, #ffd700);
        color: white;
        border-color: transparent;
    }

    .care-icon {
        font-size: 20px;
        width: 24px;
        text-align: center;
    }

    /* 放大镜样式 */
    .magnifier {
        position: fixed;
        width: 200px;
        height: 200px;
        border: 3px solid #ff6b6b;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(5px);
        z-index: 9999;
        pointer-events: none;
        box-shadow: 0 0 20px rgba(255, 107, 107, 0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }

    .magnifier-content {
        text-align: center;
        color: #333;
    }

    .magnifier-tag {
        font-size: 12px;
        color: #666;
        margin-bottom: 8px;
        font-weight: 500;
    }

    .magnifier-text {
        font-size: 16px;
        font-weight: 600;
        line-height: 1.4;
        word-break: break-word;
    }

    /* 语音扫描按钮样式 */
    .voice-scan-button {
        position: fixed;
        width: 50px;
        height: 50px;
        background: linear-gradient(135deg, #ff6b6b, #ffd700);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        cursor: pointer;
        z-index: 9999;
        box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
        animation: voiceScanPulse 2s infinite;
        pointer-events: none;
    }

    @keyframes voiceScanPulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.1); }
        100% { transform: scale(1); }
    }

    /* 语音朗读提示样式 */
    .voice-reading-tip {
        position: fixed;
        top: 20px;
        right: 20px;
        background: linear-gradient(135deg, #ff6b6b, #ffd700);
        color: white;
        padding: 15px 20px;
        border-radius: 10px;
        box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
        z-index: 10001;
        animation: slideInRight 0.3s ease;
    }

    .voice-reading-tip .tip-content {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .voice-reading-tip .tip-icon {
        font-size: 18px;
    }

    .voice-reading-tip .tip-text {
        font-size: 14px;
        font-weight: 500;
    }

    @keyframes slideInRight {
        from {
            transform: translateX(100%);
            opacity: 0;
        }
        to {
            transform: translateX(0);
            opacity: 1;
        }
    }

    /* 高对比度模式 */
    .high-contrast {
        filter: contrast(1.5) brightness(1.2);
    }

    .high-contrast * {
        color: #000 !important;
        background-color: #fff !important;
    }

    .high-contrast .sidebar,
    .high-contrast .hero-banner {
        background: #000 !important;
        color: #fff !important;
    }

    /* 大字体模式 */
    .large-text {
        font-size: 1.2em;
    }

    .large-text h1 { font-size: 2.5em; }
    .large-text h2 { font-size: 2em; }
    .large-text h3 { font-size: 1.8em; }
    .large-text p { font-size: 1.3em; }
    .large-text .menu-link { font-size: 1.2em; }

    /* 色彩辅助模式 */
    .color-assist {
        filter: grayscale(0.3) saturate(1.5);
    }

    /* 大按钮模式 */
    .large-buttons button,
    .large-buttons .menu-link,
    .large-buttons .care-btn {
        padding: 20px 30px !important;
        font-size: 18px !important;
        min-height: 60px !important;
    }

    /* 键盘导航模式 */
    .keyboard-nav *:focus {
        outline: 3px solid #ff6b6b !important;
        outline-offset: 2px !important;
    }

    /* 焦点高亮模式 */
    .focus-highlight *:focus {
        background: rgba(255, 107, 107, 0.2) !important;
        box-shadow: 0 0 10px rgba(255, 107, 107, 0.5) !important;
    }

    /* 简化界面模式 */
    .simplified-ui .hero-banner {
        padding: 20px !important;
    }

    .simplified-ui .feature-cards {
        display: none;
    }

    .simplified-ui .ai-chat-window {
        display: none;
    }

    /* 响应式设计 */
    @media (max-width: 768px) {
        .care-mode-panel {
            width: 95%;
            max-height: 90vh;
        }
        
        .care-options {
            grid-template-columns: 1fr;
        }
        
        .care-btn {
            padding: 12px 16px;
            font-size: 14px;
        }
    }
</style>

<!-- 关怀模式、返回按钮和注销按钮 -->
<div class="top-buttons">
    <button class="care-mode-toggle" onclick="toggleCareMode()" title="关怀模式">
        <span class="care-icon">❤️</span>
        <span class="care-text">关怀模式</span>
    </button>
    <a href="/main" class="back-button">
        <span class="back-button-icon">←</span>
        <span>返回主页</span>
    </a>
    <a href="#" class="logout-button" onclick="handleLogout()">
        <span class="logout-icon">🚪</span>
        <span>注销登录</span>
    </a>
</div>

<style>

        text-align: center;
        margin-bottom: 30px;
    }

    .chart-section {
        grid-column: 1;
        grid-row: 1;
    }

    .data-section {

        grid-column: 1 / -1;
        grid-row: 2;

    .chart-tabs, .data-tabs {
        display: flex;
        gap: 5px;
        margin-left: auto;

    .chart-tab, .data-tab {
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.2);

        padding: 6px 12px;
        color: rgba(255, 255, 255, 0.7);
        font-size: 12px;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .chart-tab:hover, .data-tab:hover {
        background: rgba(255, 255, 255, 0.2);

    }

    .chart-tab.active, .data-tab.active {

    }

    /* 数据面板样式 */
    .data-panel {
        display: none;
        max-height: 400px;
        overflow-y: auto;
    }

    .data-panel.active {
        display: block;
    }

    /* 紧凑表格样式 */
    .compact-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
    }

    .compact-table th,
    .compact-table td {
        padding: 8px 6px;
        text-align: left;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .compact-table th {
        background: rgba(255, 255, 255, 0.05);

    .compact-table tr:hover {

        .data-section {

        .sentiment-section {
            grid-column: 1;

        }

    .widget-card {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(20px);
        border-radius: 15px;
        padding: 20px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        transition: all 0.3s ease;
    }

    .widget-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    .widget-header {
        display: flex;
        align-items: center;
        margin-bottom: 15px;
    }

    .widget-icon {
        font-size: 24px;
        margin-right: 15px;
    }

    .widget-card h3 {
        font-size: 18px;
        font-weight: 600;
        color: white;
    }

    .widget-content {
        color: rgba(255, 255, 255, 0.9);
        line-height: 1.6;
    }

    .chart-container {

        height: 200px;
        margin-bottom: 15px;
        width: 100%;
        overflow: hidden;
    }

    .chart-container canvas {
        width: 100% !important;

        max-width: 100%;
    }

    .market-summary {

        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;

    .summary-item {

    .summary-label {

    .summary-value {

    .data-table tr:hover {

    .trend-indicator {

    .trend-up {

    }

    .loading-spinner {

    }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    .btn-primary {
        background: linear-gradient(135deg, #00d4ff, #ff6b6b);
        border: none;
        color: white;
        padding: 10px 20px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
        transition: all 0.3s ease;
    }

    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 212, 255, 0.3);
    }

    .btn-secondary {
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.3);

    .filter-controls {

    .filter-select {

    .filter-select option {
        background: #333;
        color: white;

</style>

<script>
// 市场分析页面特定的JavaScript功能
document.addEventListener('DOMContentLoaded', function() {
    // 检查登录状态
    if (!checkLoginStatus()) return;
    
    loadMarketData();
    initCharts();
    
    // 初始化默认图表
    setTimeout(() => {
        const canvas = document.getElementById('mainChart');
        if (canvas) {
            const ctx = canvas.getContext('2d');
            drawStockChart(ctx, canvas);
        }
    }, 500);
});

// 加载市场数据
async function loadMarketData() {
    try {
        await Promise.all([
            loadMarketOverview(),
            loadHotStocks(),
            loadSectorAnalysis(),
            loadEconomicIndicators(),
            loadMarketSentiment()
        ]);
    } catch (error) {
        console.error('加载市场数据失败:', error);
    }
}

// 更新市场数据
function updateMarketData() {
    const timeRange = document.getElementById('timeRange').value;
    const marketType = document.getElementById('marketType').value;
    
    console.log('更新市场数据:', { timeRange, marketType });
    
    // 根据市场类型更新数据
    updateMarketOverview(marketType);
    updateHotStocks(marketType);
    updateSectorAnalysis(marketType);
    updateEconomicIndicators(marketType);
    updateMarketSentiment(marketType);
    updateChart(marketType);
}

// 刷新市场数据
function refreshMarketData() {
    loadMarketData();
}

// 绘制线图通用函数
function drawLineChart(ctx, canvas, data, labels, color, title) {
    const padding = 40;
    const chartWidth = canvas.width - padding * 2;
    const chartHeight = canvas.height - padding * 2;
    
    const minValue = Math.min(...data);
    const maxValue = Math.max(...data);
    const valueRange = maxValue - minValue;
    
    // 绘制背景
    ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
    ctx.fillRect(padding, padding, chartWidth, chartHeight);
    
    // 绘制网格线
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
    ctx.lineWidth = 1;
    for (let i = 0; i <= 5; i++) {
        const y = padding + (chartHeight / 5) * i;
        ctx.beginPath();
        ctx.moveTo(padding, y);
        ctx.lineTo(padding + chartWidth, y);
        ctx.stroke();
    }
    
    // 绘制数据线
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    
    data.forEach((value, index) => {
        const x = padding + (chartWidth / (data.length - 1)) * index;
        const y = padding + chartHeight - ((value - minValue) / valueRange) * chartHeight;
        
        if (index === 0) {
            ctx.moveTo(x, y);
        } else {
            ctx.lineTo(x, y);
        }
    });
    ctx.stroke();
    
    // 绘制数据点
    ctx.fillStyle = color;
    data.forEach((value, index) => {
        const x = padding + (chartWidth / (data.length - 1)) * index;
        const y = padding + chartHeight - ((value - minValue) / valueRange) * chartHeight;
        
        ctx.beginPath();
        ctx.arc(x, y, 4, 0, 2 * Math.PI);
        ctx.fill();
    });
    
    // 绘制标题
    ctx.fillStyle = 'white';
    ctx.font = '16px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(title, canvas.width / 2, 30);
}

// 放大镜功能
function toggleMagnifier() {
    magnifierEnabled = !magnifierEnabled;
    
    if (magnifierEnabled) {
        enableMagnifier();
        updateButtonState('magnifier', true);
    } else {
        disableMagnifier();
        updateButtonState('magnifier', false);
    }
}

function enableMagnifier() {
    const magnifier = document.createElement('div');
    magnifier.id = 'magnifier';
    magnifier.className = 'magnifier';
    document.body.appendChild(magnifier);
    
    // 让关怀模式面板透明
    const carePanel = document.getElementById('careModePanel');
    if (carePanel) {
        carePanel.style.opacity = '0.3';
    }
    
    document.addEventListener('mousemove', handleMagnifierMove);
}

function disableMagnifier() {
    const magnifier = document.getElementById('magnifier');
    if (magnifier) {
        magnifier.remove();
    }
    
    // 恢复关怀模式面板透明度
    const carePanel = document.getElementById('careModePanel');
    if (carePanel) {
        carePanel.style.opacity = '1';
    }
    
    document.removeEventListener('mousemove', handleMagnifierMove);
}

function handleMagnifierMove(e) {
    const magnifier = document.getElementById('magnifier');
    if (magnifier) {
        const rect = magnifier.getBoundingClientRect();
        const centerX = rect.width / 2;
        const centerY = rect.height / 2;
        
        magnifier.style.left = (e.clientX - centerX) + 'px';
        magnifier.style.top = (e.clientY - centerY) + 'px';
        
        // 获取鼠标位置下的元素
        const elementBelow = document.elementFromPoint(e.clientX, e.clientY);
        if (elementBelow) {
            // 放大显示元素内容
            const elementText = elementBelow.textContent || elementBelow.innerText || '';
            const elementTag = elementBelow.tagName.toLowerCase();
            
            magnifier.innerHTML = `
                <div class="magnifier-content">
                    <div class="magnifier-tag">${elementTag}</div>
                    <div class="magnifier-text">${elementText.substring(0, 100)}</div>
                </div>
            `;
        }
    }
}

        scanButton.style.left = (e.clientX - 25) + 'px';
        scanButton.style.top = (e.clientY - 25) + 'px';

function handleVoiceScanClick(e) {
    e.preventDefault();
    const elementBelow = document.elementFromPoint(e.clientX, e.clientY);
    if (elementBelow) {
        const text = elementBelow.textContent || elementBelow.innerText || '';
        if (text.trim()) {
            // 使用语音合成朗读文字
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-CN';
                utterance.rate = 0.8;
                utterance.pitch = 1;
                speechSynthesis.speak(utterance);
                
                // 显示朗读提示
                showVoiceReadingTip(text);
            }
        }
    }
}

function showVoiceReadingTip(text) {
    const tip = document.createElement('div');
    tip.className = 'voice-reading-tip';
    tip.innerHTML = `
        <div class="tip-content">
            <span class="tip-icon">🔊</span>
            <span class="tip-text">正在朗读：${text.substring(0, 20)}...</span>
        </div>
    `;
    document.body.appendChild(tip);
    
    setTimeout(() => {
        if (tip.parentElement) {
            tip.remove();
        }
    }, 3000);
}

// 语音播报
function toggleVoiceReading() {
    if ('speechSynthesis' in window) {
        const utterance = new SpeechSynthesisUtterance('欢迎使用智游金旅关怀模式，我们将为您提供贴心的无障碍服务');
        utterance.lang = 'zh-CN';
        speechSynthesis.speak(utterance);
    }
}

// 音量调节
function adjustVolume() {
    const volume = prompt('请输入音量大小 (0-100):', '50');
    if (volume !== null) {
        localStorage.setItem('careModeVolume', volume);
    }
}

// 大按钮模式
function toggleLargeButtons() {
    document.body.classList.toggle('large-buttons');
}

// 键盘导航
function toggleKeyboardNav() {
    document.body.classList.toggle('keyboard-nav');
}

// 焦点高亮
function toggleFocusHighlight() {
    document.body.classList.toggle('focus-highlight');
}

// 简化界面
function toggleSimplifiedUI() {
    document.body.classList.toggle('simplified-ui');
}

// 操作引导
function showOperationGuide() {
    alert('操作引导功能：\n1. 点击任意按钮会有操作提示\n2. 重要操作会显示确认对话框\n3. 支持键盘快捷键操作\n4. 语音播报会指导您完成操作');
}

// 更新按钮状态
function updateButtonState(buttonType, isActive) {
    const buttons = document.querySelectorAll('.care-btn');
    buttons.forEach(button => {
        const icon = button.querySelector('.care-icon');
        if (icon) {
            if (buttonType === 'magnifier' && icon.textContent === '🔍') {
                button.classList.toggle('active', isActive);
            } else if (buttonType === 'voice' && icon.textContent === '🎤') {
                button.classList.toggle('active', isActive);
            }
        }
    });
}

// 禁用所有关怀功能
function disableAllCareFeatures() {
    magnifierEnabled = false;
    voiceEnabled = false;
    highContrastEnabled = false;
    largeTextEnabled = false;
    
    document.body.classList.remove('high-contrast', 'large-text', 'color-assist', 'large-buttons', 'keyboard-nav', 'focus-highlight', 'simplified-ui');
    disableMagnifier();
    stopVoiceRecognition();
}
</script>
</body>
