<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <!-- Leaflet地图库 -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

    .tourism-header {
        text-align: center;
            margin-bottom: 20px;
    }

    .tourism-header h2 {
            font-size: 32px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }

    .city-selector-container {
        display: flex;
        justify-content: center;
        align-items: center;
            gap: 15px;
            margin: 0;
    }

    .city-selector {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.2);
        color: white;
        font-size: 16px;
            backdrop-filter: blur(10px);
        }

        .btn-primary, .btn-secondary {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
        cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
    }

        .btn-primary {
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
        color: white;
    }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .tourism-widgets {
        display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto auto auto;
            gap: 12px;
            margin-bottom: 15px;
    }

    .widget-card {
        background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    }

        

    .widget-header {
        display: flex;
        align-items: center;
            margin-bottom: 15px;
    }

    .widget-icon {
        font-size: 24px;
            margin-right: 10px;
    }

        .widget-header h3 {
        font-size: 18px;
            margin: 0;
        }

        .widget-subtitle {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            margin-left: auto;
    }

    .loading-spinner {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #4ecdc4;
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

        .top-buttons {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
        gap: 10px;
            z-index: 1000;
        }

        /* 关怀模式按钮 */
        .care-mode-toggle {
            display: flex;
            align-items: center;
        gap: 8px;
            padding: 12px 16px;
            background: linear-gradient(135deg, #ff6b6b, #ffd700);
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
    }

        .care-mode-toggle:hover {
        transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.4);
        }

        .care-mode-toggle .care-icon {
            font-size: 16px;
        }

        .care-mode-toggle .care-text {
            font-size: 13px;
        }

        /* 关怀模式面板样式 */
        .care-mode-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 800px;
            max-height: 80vh;
            background: linear-gradient(135deg, 
                rgba(255, 255, 255, 0.95) 0%, 
                rgba(255, 255, 255, 0.9) 100%);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            z-index: 10000;
            overflow-y: auto;
            border: 2px solid rgba(255, 107, 107, 0.3);
        }

        .care-panel-header {
        display: flex;
        justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            border-bottom: 2px solid rgba(255, 107, 107, 0.2);
            background: linear-gradient(135deg, #ff6b6b, #ffd700);
            color: white;
            border-radius: 18px 18px 0 0;
        }

        .care-panel-header h3 {
            margin: 0;
            font-size: 24px;
        font-weight: 700;
        }

        .care-close-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
        color: white;
            font-size: 24px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .care-close-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        .care-panel-content {
            padding: 30px;
        }

        .care-section {
            margin-bottom: 30px;
        }

        .care-section h4 {
            color: #333;
            font-size: 18px;
        font-weight: 600;
        margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 2px solid #ff6b6b;
        }

        .care-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .care-btn {
        display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px 20px;
            background: linear-gradient(135deg, 
                rgba(255, 107, 107, 0.1) 0%, 
                rgba(255, 215, 0, 0.1) 100%);
            border: 2px solid rgba(255, 107, 107, 0.3);
            border-radius: 12px;
            color: #333;
            font-size: 16px;
            font-weight: 500;
        cursor: pointer;
        transition: all 0.3s ease;
            text-align: left;
        }

        .care-btn:hover {
            background: linear-gradient(135deg, 
                rgba(255, 107, 107, 0.2) 0%, 
                rgba(255, 215, 0, 0.2) 100%);
            border-color: #ff6b6b;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.2);
        }

        .care-btn.active {
            background: linear-gradient(135deg, #ff6b6b, #ffd700);
        color: white;
        border-color: transparent;
    }

        .care-icon {
            font-size: 20px;
            width: 24px;
            text-align: center;
        }

        /* 放大镜样式 */
        .magnifier {
            position: fixed;
            width: 200px;
            height: 200px;
            border: 3px solid #ff6b6b;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(5px);
            z-index: 9999;
            pointer-events: none;
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.5);
        display: flex;
        align-items: center;
            justify-content: center;
            padding: 20px;
    }

        .magnifier-content {
            text-align: center;
            color: #333;
    }

        .magnifier-tag {
        font-size: 12px;
            color: #666;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .magnifier-text {
            font-size: 16px;
        font-weight: 600;
            line-height: 1.4;
            word-break: break-word;
        }

        /* 语音扫描按钮样式 */
        .voice-scan-button {
            position: fixed;
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #ff6b6b, #ffd700);
            border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
            font-size: 24px;
        cursor: pointer;
            z-index: 9999;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
            animation: voiceScanPulse 2s infinite;
            pointer-events: none;
        }

        @keyframes voiceScanPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* 语音朗读提示样式 */
        .voice-reading-tip {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #ff6b6b, #ffd700);
        color: white;
            padding: 15px 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
            z-index: 10001;
            animation: slideInRight 0.3s ease;
        }

        .voice-reading-tip .tip-content {
        display: flex;
        align-items: center;
        gap: 10px;
        }

        .voice-reading-tip .tip-icon {
            font-size: 18px;
        }

        .voice-reading-tip .tip-text {
        font-size: 14px;
            font-weight: 500;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* 高对比度模式 */
        .high-contrast {
            filter: contrast(1.5) brightness(1.2);
        }

        .high-contrast * {
            color: #000 !important;
            background-color: #fff !important;
        }

        .high-contrast .sidebar,
        .high-contrast .hero-banner {
            background: #000 !important;
            color: #fff !important;
        }

        /* 大字体模式 */
        .large-text {
            font-size: 1.2em;
        }

        .large-text h1 { font-size: 2.5em; }
        .large-text h2 { font-size: 2em; }
        .large-text h3 { font-size: 1.8em; }
        .large-text p { font-size: 1.3em; }
        .large-text .menu-link { font-size: 1.2em; }

        /* 色彩辅助模式 */
        .color-assist {
            filter: grayscale(0.3) saturate(1.5);
        }

        /* 大按钮模式 */
        .large-buttons button,
        .large-buttons .menu-link,
        .large-buttons .care-btn {
            padding: 20px 30px !important;
            font-size: 18px !important;
            min-height: 60px !important;
        }

        /* 键盘导航模式 */
        .keyboard-nav *:focus {
            outline: 3px solid #ff6b6b !important;
            outline-offset: 2px !important;
        }

        /* 焦点高亮模式 */
        .focus-highlight *:focus {
            background: rgba(255, 107, 107, 0.2) !important;
            box-shadow: 0 0 10px rgba(255, 107, 107, 0.5) !important;
        }

        /* 简化界面模式 */
        .simplified-ui .hero-banner {
            padding: 20px !important;
        }

        .simplified-ui .feature-cards {
            display: none;
        }

        .simplified-ui .ai-chat-window {
            display: none;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .care-mode-panel {
                width: 95%;
                max-height: 90vh;
            }
            
            .care-options {
                grid-template-columns: 1fr;
            }
            
            .care-btn {
                padding: 12px 16px;
        font-size: 14px;
    }
    }

        .back-button, .logout-button {
            background: rgba(255, 255, 255, 0.2);
        color: white;
            text-decoration: none;
            padding: 10px 15px;

        .logout-button:hover {

        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.3);
        transform: translateY(-2px);
    }

        .back-button-icon {
        font-size: 18px;
        }

        /* 金融旅游结合话术横幅 */
        .tourism-slogan-banner {
            background: linear-gradient(135deg, 
                rgba(0, 150, 255, 0.2) 0%, 
                rgba(255, 100, 200, 0.2) 50%, 
                rgba(100, 0, 255, 0.2) 100%);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 25px 30px;
            margin: 20px 0 30px;
        text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
        }

        .tourism-slogan-banner::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(255, 255, 255, 0.1), 
                transparent);
            animation: sloganShine 3s ease-in-out infinite;
        }

        @keyframes sloganShine {
            0% { left: -100%; }
            50% { left: 100%; }
            100% { left: 100%; }
        }

        .tourism-slogan-title {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #00d4ff, #ff6b6b, #4ecdc4, #f093fb);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        margin-bottom: 15px;
            text-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
            animation: titlePulse 2s ease-in-out infinite alternate;
        }

        .tourism-slogan-subtitle {
        font-size: 18px;
            color: rgba(255, 255, 255, 0.9);
        margin-bottom: 20px;
            font-weight: 500;
            line-height: 1.6;
        }

        .tourism-slogan-tags {
        display: flex;
        justify-content: center;
            gap: 20px;
        flex-wrap: wrap;
    }

        .tourism-tag {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px;
            padding: 10px 20px;
        font-size: 14px;
        font-weight: 600;
        color: white;
        transition: all 0.3s ease;
            animation: tagFloat 3s ease-in-out infinite;
        }

        .tourism-tag:nth-child(1) { animation-delay: 0s; }
        .tourism-tag:nth-child(2) { animation-delay: 0.5s; }
        .tourism-tag:nth-child(3) { animation-delay: 1s; }
        .tourism-tag:nth-child(4) { animation-delay: 1.5s; }
        .tourism-tag:nth-child(5) { animation-delay: 2s; }

        .tourism-tag:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        @keyframes titlePulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.02); }
        }

        @keyframes tagFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
        }

        @media (max-width: 1200px) {
            .tourism-widgets {
                grid-template-columns: 1fr;
                grid-template-rows: auto;
            }
            
            .tourism-slogan-banner {
                margin: 15px 0 25px;
                padding: 20px 25px;
            }
            
            .tourism-slogan-title {
                font-size: 28px;
            }
            
            .tourism-slogan-subtitle {
        font-size: 16px;
    }

            .tourism-tag {
        font-size: 12px;
        padding: 8px 16px;
            }
        }

        @media (max-width: 768px) {
            .tourism-slogan-banner {
                margin: 10px 0 20px;
                padding: 15px 20px;
            }
            
            .tourism-slogan-title {
        font-size: 24px;
    }

            .tourism-slogan-subtitle {
        font-size: 14px;
            }
            
            .tourism-slogan-tags {
        gap: 10px;
    }

            .tourism-tag {
        font-size: 11px;
        padding: 6px 12px;
            }
    }
</style>
</head>
<body>
    <!-- 关怀模式、返回按钮和注销按钮 -->

<script>
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            console.log('页面加载完成，开始初始化...');

            // 检查登录状态
            if (!checkLoginStatus()) return;

            loadTourismData();

            // 初始化互动功能
            initTourismInteractiveFeatures();
        });

// 加载旅游数据
async function loadTourismData() {
    try {
                console.log('开始加载旅游数据...');
        await Promise.all([
            loadWeatherInfo(),
            loadHotelPrices(),
            loadAttractions(),
                    loadSmartTourismCenter()
        ]);
                console.log('所有数据加载完成');
    } catch (error) {
        console.error('加载旅游数据失败:', error);
    }
}

// 加载天气信息
async function loadWeatherInfo() {
    try {
        const response = await fetch('/api/tourism/weather');
        const data = await response.json();
        
        const weatherContainer = document.getElementById('weatherInfo');
                if (weatherContainer && data.success) {
                    const weather = data.weather;
                    console.log('天气数据:', weather);
                    console.log('自驾指南数据:', weather.drivingGuide);
            weatherContainer.innerHTML = `
                        <div style="text-align: center; margin-bottom: 15px;">
                            <div style="font-size: 36px; margin-bottom: 10px;">${weather.current.temperature}°C</div>
                            <div style="font-size: 18px; margin-bottom: 10px;">${weather.current.description}</div>

// 天气标签切换互动
function addWeatherTabInteraction() {
    const weatherTabs = document.querySelectorAll('.weather-tab');
    weatherTabs.forEach(tab => {
        tab.addEventListener('click', function() {
            // 移除所有活跃状态
            weatherTabs.forEach(t => t.classList.remove('active'));
            
            // 添加当前活跃状态
            this.classList.add('active');
            
            // 添加点击动画
            this.style.transform = 'scale(0.95)';
            setTimeout(() => {
                this.style.transform = 'scale(1)';
            }, 150);
        });
    });
}

// 酒店筛选互动
function addHotelFilterInteraction() {
    const filterButtons = document.querySelectorAll('.hotel-filter-btn');
    filterButtons.forEach(button => {
        button.addEventListener('click', function() {
            // 切换活跃状态
            this.classList.toggle('active');
            
            // 添加点击效果
            this.style.transform = 'scale(0.9)';
            setTimeout(() => {
                this.style.transform = 'scale(1)';
            }, 100);
            
            // 重新筛选酒店
            filterHotels();
        });
    });
}

// 景点卡片互动
function addAttractionCardInteraction() {
    const attractionCards = document.querySelectorAll('.attraction-card');
    attractionCards.forEach(card => {
        // 悬停效果
        card.addEventListener('mouseenter', function() {
            this.style.transform = 'translateY(-8px)';
            this.style.boxShadow = '0 15px 40px rgba(0, 212, 255, 0.3)';
        });
        
        card.addEventListener('mouseleave', function() {
            this.style.transform = 'translateY(0)';
            this.style.boxShadow = '0 5px 15px rgba(0, 0, 0, 0.1)';
        });
        
        // 点击效果

// 关怀模式功能
let careModeEnabled = false;
let magnifierEnabled = false;
let voiceEnabled = false;
let highContrastEnabled = false;
let largeTextEnabled = false;

// 切换关怀模式
function toggleCareMode() {
    careModeEnabled = !careModeEnabled;
    
    if (careModeEnabled) {
        showCareModePanel();
    } else {
        hideCareModePanel();
        disableAllCareFeatures();
    }
}

        <div class="care-panel-content">

                <h4>🔍 视觉辅助</h4>
                <div class="care-options">
                    <button class="care-btn" onclick="toggleMagnifier()">
                        <span class="care-icon">🔍</span>
                        <span>放大镜</span>
                    </button>
                    <button class="care-btn" onclick="toggleHighContrast()">
                        <span class="care-icon">🌙</span>
                        <span>高对比度</span>
                    </button>
                    <button class="care-btn" onclick="toggleLargeText()">
                        <span class="care-icon">📏</span>
                        <span>大字体</span>
                    </button>
                    <button class="care-btn" onclick="toggleColorAssist()">
                        <span class="care-icon">🎨</span>
                        <span>色彩辅助</span>
                    </button>
                </div>
            </div>
            
            <div class="care-section">
                <h4>🔊 语音辅助</h4>
                <div class="care-options">
                    <button class="care-btn" onclick="toggleVoiceRecognition()">

                        <span>语音识别</span>
                    </button>
                    <button class="care-btn" onclick="toggleVoiceReading()">
                        <span class="care-icon">🔊</span>
                        <span>语音播报</span>
                    </button>
                    <button class="care-btn" onclick="adjustVolume()">
                        <span class="care-icon">🔊</span>
                        <span>音量调节</span>
                    </button>
                </div>
            </div>

// 隐藏关怀模式面板

    }

// 放大镜功能
function toggleMagnifier() {
    magnifierEnabled = !magnifierEnabled;
    
    if (magnifierEnabled) {
        enableMagnifier();
        updateButtonState('magnifier', true);
    } else {
        disableMagnifier();
        updateButtonState('magnifier', false);
    }
}

function enableMagnifier() {
    const magnifier = document.createElement('div');
    magnifier.id = 'magnifier';
    magnifier.className = 'magnifier';
    document.body.appendChild(magnifier);
    
    // 让关怀模式面板透明
    const carePanel = document.getElementById('careModePanel');
    if (carePanel) {
        carePanel.style.opacity = '0.3';
    }
    
    document.addEventListener('mousemove', handleMagnifierMove);
}

function disableMagnifier() {
    const magnifier = document.getElementById('magnifier');
    if (magnifier) {
        magnifier.remove();
    }
    
    // 恢复关怀模式面板透明度
    const carePanel = document.getElementById('careModePanel');
    if (carePanel) {
        carePanel.style.opacity = '1';
    }
    
    document.removeEventListener('mousemove', handleMagnifierMove);
}

function handleMagnifierMove(e) {
    const magnifier = document.getElementById('magnifier');
    if (magnifier) {
        const rect = magnifier.getBoundingClientRect();
        const centerX = rect.width / 2;
        const centerY = rect.height / 2;
        
        magnifier.style.left = (e.clientX - centerX) + 'px';
        magnifier.style.top = (e.clientY - centerY) + 'px';
        
        // 获取鼠标位置下的元素
        const elementBelow = document.elementFromPoint(e.clientX, e.clientY);
        if (elementBelow) {
            // 放大显示元素内容
            const elementText = elementBelow.textContent || elementBelow.innerText || '';
            const elementTag = elementBelow.tagName.toLowerCase();
            
            magnifier.innerHTML = `
                <div class="magnifier-content">
                    <div class="magnifier-tag">${elementTag}</div>
                    <div class="magnifier-text">${elementText.substring(0, 100)}</div>
                </div>
            `;
        }
    }
}

// 高对比度模式
function toggleHighContrast() {
    highContrastEnabled = !highContrastEnabled;
    
    if (highContrastEnabled) {
        document.body.classList.add('high-contrast');
    } else {
        document.body.classList.remove('high-contrast');
    }
}

// 大字体模式
function toggleLargeText() {
    largeTextEnabled = !largeTextEnabled;
    
    if (largeTextEnabled) {
        document.body.classList.add('large-text');
    } else {
        document.body.classList.remove('large-text');
    }
}

// 色彩辅助
function toggleColorAssist() {
    document.body.classList.toggle('color-assist');
}

// 语音识别
function toggleVoiceRecognition() {
    voiceEnabled = !voiceEnabled;
    
    if (voiceEnabled) {
        startVoiceRecognition();
        updateButtonState('voice', true);
    } else {
        stopVoiceRecognition();
        updateButtonState('voice', false);
    }
}

function startVoiceRecognition() {
    // 创建扫描按钮
    const scanButton = document.createElement('div');
    scanButton.id = 'voiceScanButton';
    scanButton.className = 'voice-scan-button';
    scanButton.innerHTML = '📖';
    document.body.appendChild(scanButton);
    
    // 让关怀模式面板透明
    const carePanel = document.getElementById('careModePanel');
    if (carePanel) {
        carePanel.style.opacity = '0.3';
    }
    
    // 添加鼠标移动事件监听
    document.addEventListener('mousemove', handleVoiceScan);
    document.addEventListener('click', handleVoiceScanClick);
}

function stopVoiceRecognition() {
    const scanButton = document.getElementById('voiceScanButton');
    if (scanButton) {
        scanButton.remove();
    }
    
    // 恢复关怀模式面板透明度
    const carePanel = document.getElementById('careModePanel');
    if (carePanel) {
        carePanel.style.opacity = '1';
    }
    
    document.removeEventListener('mousemove', handleVoiceScan);
    document.removeEventListener('click', handleVoiceScanClick);
}

function handleVoiceScan(e) {
    const scanButton = document.getElementById('voiceScanButton');
    if (scanButton) {
        scanButton.style.left = (e.clientX - 25) + 'px';
        scanButton.style.top = (e.clientY - 25) + 'px';
    }
}

function handleVoiceScanClick(e) {
    e.preventDefault();
    const elementBelow = document.elementFromPoint(e.clientX, e.clientY);
    if (elementBelow) {
        const text = elementBelow.textContent || elementBelow.innerText || '';
        if (text.trim()) {
            // 使用语音合成朗读文字
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-CN';
                utterance.rate = 0.8;
                utterance.pitch = 1;
                speechSynthesis.speak(utterance);
                
                // 显示朗读提示
                showVoiceReadingTip(text);
            }
        }
    }
}

function showVoiceReadingTip(text) {
    const tip = document.createElement('div');
    tip.className = 'voice-reading-tip';
    tip.innerHTML = `
        <div class="tip-content">
            <span class="tip-icon">🔊</span>
            <span class="tip-text">正在朗读：${text.substring(0, 20)}...</span>
        </div>
    `;
    document.body.appendChild(tip);
    
    setTimeout(() => {
        if (tip.parentElement) {
            tip.remove();
        }
    }, 3000);
}

// 语音播报
function toggleVoiceReading() {
    if ('speechSynthesis' in window) {
        const utterance = new SpeechSynthesisUtterance('欢迎使用智游金旅关怀模式，我们将为您提供贴心的无障碍服务');
        utterance.lang = 'zh-CN';
        speechSynthesis.speak(utterance);
    }
}

// 更新按钮状态
function updateButtonState(buttonType, isActive) {
    const buttons = document.querySelectorAll('.care-btn');
    buttons.forEach(button => {
        const icon = button.querySelector('.care-icon');
        if (icon) {
            if (buttonType === 'magnifier' && icon.textContent === '🔍') {
                button.classList.toggle('active', isActive);
            } else if (buttonType === 'voice' && icon.textContent === '🎤') {
                button.classList.toggle('active', isActive);
            }
        }
    });
}

// 禁用所有关怀功能
function disableAllCareFeatures() {
    magnifierEnabled = false;
    voiceEnabled = false;
    highContrastEnabled = false;
    largeTextEnabled = false;
    
    document.body.classList.remove('high-contrast', 'large-text', 'color-assist', 'large-buttons', 'keyboard-nav', 'focus-highlight', 'simplified-ui');
    disableMagnifier();
    stopVoiceRecognition();
}
